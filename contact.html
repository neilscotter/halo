<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Halo Development & Construction</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="logo"><img src="assets/logo.svg" alt="Halo Development & Construction logo" /> Halo Development & Construction</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <section>
    <h2>Get In Touch</h2>
    <div class="contact-info">
      <p>Have a project in mind? Reach out and we'll get back to you shortly.</p>
      <p>Email: <a href="mailto:neils@haloconstruction.me">neils@haloconstruction.me</a></p>
    </div>

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit" class="btn">Send Message</button>
    </form>
  </section>

  <footer>
    &copy; 2026 Halo Development & Construction. All rights reserved.
  </footer>
</body>
</html>
